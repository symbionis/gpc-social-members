<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <title>Geneva Polo Club</title>
  <style type="text/css" rel="stylesheet" media="all">
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@200;300;400;500;600&display=swap');

    body {
      margin: 0;
      padding: 0;
      width: 100% !important;
      -webkit-text-size-adjust: 100%;
      -ms-text-size-adjust: 100%;
      background-color: #F2F4F6;
      color: #052938;
    }
    body, td, th {
      font-family: 'Poppins', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.65;
      color: #052938;
    }
    a { color: #052938; text-decoration: underline; }
    a:hover { color: #95CEE1; }

    .email-wrapper { width: 100%; margin: 0; padding: 0; background-color: #F2F4F6; }
    .email-content { width: 100%; margin: 0; padding: 0; }

    .preheader {
      display: none !important; visibility: hidden; mso-hide: all;
      font-size: 1px; line-height: 1px; max-height: 0; max-width: 0; opacity: 0; overflow: hidden;
    }

    .email-body { width: 100%; margin: 0; padding: 0; }
    .email-body_inner { width: 600px; margin: 0 auto; padding: 0; background-color: #FFFFFF; }
    .body-content { padding: 40px 48px; }

    h1 { font-family: 'Playfair Display', Georgia, 'Times New Roman', serif; font-size: 26px; font-weight: 700; color: #052938; margin-top: 0; margin-bottom: 8px; line-height: 1.3; }
    h2 { font-family: 'Playfair Display', Georgia, 'Times New Roman', serif; font-size: 20px; font-weight: 700; color: #052938; margin-top: 24px; margin-bottom: 8px; line-height: 1.3; }
    h3 { font-family: 'Poppins', 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 13px; font-weight: 200; letter-spacing: 3px; text-transform: uppercase; color: #95CEE1; margin-top: 24px; margin-bottom: 4px; }
    p { margin-top: 0; margin-bottom: 16px; font-size: 16px; line-height: 1.65; color: #333F48; }
    p.sub { font-size: 13px; color: #6B7C93; }

    .button { display: inline-block; width: auto; background-color: #052938; border-radius: 3px; color: #FFFFFF !important; font-family: 'Poppins', 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 14px; font-weight: 500; letter-spacing: 1px; text-align: center; text-decoration: none; padding: 12px 32px; -webkit-text-size-adjust: none; }
    .button:hover { background-color: #0A3D54; }
    .button--secondary { background-color: #FFFFFF; border: 1px solid #052938; color: #052938 !important; }

    .divider { border: none; border-top: 1px solid #E8ECF0; margin: 24px 0; }
    .divider--brand { border-top: 2px solid #95CEE1; margin: 32px 0; }

    .attributes_content { background-color: #F9FAFB; padding: 20px 24px; border-left: 3px solid #95CEE1; }

    .email-footer { width: 600px; margin: 0 auto; padding: 32px 48px; text-align: center; }
    .email-footer p { font-size: 12px; line-height: 1.6; color: #8B99A8; margin: 0; }
    .email-footer a { color: #8B99A8; text-decoration: underline; }
    .email-footer a:hover { color: #052938; }
    .footer-links { margin-top: 12px; }
    .footer-links a { font-size: 12px; color: #8B99A8; margin: 0 8px; }

    @media only screen and (max-width: 640px) {
      .email-body_inner, .email-footer { width: 100% !important; }
      .body-content { padding: 28px 24px !important; }
      .email-footer { padding: 24px 24px !important; }
      h1 { font-size: 22px !important; }
      h2 { font-size: 18px !important; }
    }

    .align-center { text-align: center; }
    .text-muted { color: #8B99A8; }
    .text-accent { color: #95CEE1; }
  </style>
  <!--[if mso]>
  <style type="text/css">
    body, td, th { font-family: Georgia, 'Times New Roman', serif; }
    h1, h2 { font-family: Georgia, 'Times New Roman', serif; }
    h3 { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
    .button { padding: 12px 32px; }
  </style>
  <![endif]-->
</head>
<body>

  <span class="preheader">{{preheader}}</span>

  <table class="email-wrapper" width="100%" cellpadding="0" cellspacing="0" role="presentation">
    <tr>
      <td align="center">
        <table class="email-content" width="100%" cellpadding="0" cellspacing="0" role="presentation">

          <!-- HEADER -->
          <tr>
            <td align="center" style="background-color: #052938;">
              <table width="600" align="center" cellpadding="0" cellspacing="0" role="presentation">
                <tr>
                  <td align="center" style="padding: 32px 0 8px; text-align: center;">
                    <a href="https://genevapolo.com" target="_blank" style="text-decoration: none;">
                      <img src="https://gpc-social-members-production.up.railway.app/images/polo_club_logo.png" alt="Geneva Polo Club" width="80" style="display: block; margin: 0 auto; max-width: 80px; height: auto; border: 0;" />
                    </a>
                  </td>
                </tr>
                <tr>
                  <td align="center" style="padding: 0 0 4px; text-align: center; font-family: 'Playfair Display', Georgia, 'Times New Roman', serif; font-size: 18px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: #FFFFFF;">
                    Geneva Polo Club
                  </td>
                </tr>
                <tr>
                  <td align="center" style="padding: 0 0 28px; text-align: center; font-family: 'Poppins', 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 11px; font-weight: 200; letter-spacing: 4px; text-transform: uppercase; color: #95CEE1;">
                    Elegance &middot; Passion &middot; Fun
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Accent Line -->
          <tr>
            <td style="height: 3px; background: linear-gradient(90deg, #052938 0%, #95CEE1 50%, #052938 100%); font-size: 1px; line-height: 1px;">
              &nbsp;
            </td>
          </tr>

          <!-- BODY -->
          <tr>
            <td class="email-body" width="100%">
              <table class="email-body_inner" align="center" width="600" cellpadding="0" cellspacing="0" role="presentation">
                <tr>
                  <td class="body-content">

                    {{{@content}}}

                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- FOOTER -->
          <tr>
            <td>
              <table class="email-footer" align="center" width="600" cellpadding="0" cellspacing="0" role="presentation">
                <tr>
                  <td align="center" style="text-align: center;">

                    <img src="https://gpc-social-members-production.up.railway.app/images/polo_club_logo.png" alt="" width="40" style="display: block; margin: 0 auto 16px; max-width: 40px; height: auto; opacity: 0.35; border: 0;" />

                    <p>
                      Geneva Polo Club<br />
                      Route de Compois, 1246 Corsier, Geneva
                    </p>

                    <div class="footer-links">
                      <a href="https://genevapolo.com">Website</a>
                      <a href="https://instagram.com/genevapolo">Instagram</a>
                      {{#unsubscribe_url}}<a href="{{unsubscribe_url}}">Unsubscribe</a>{{/unsubscribe_url}}
                    </div>

                    <p style="margin-top: 16px;">
                      &copy; 2026 Geneva Polo Club Association. All rights reserved.
                    </p>

                  </td>
                </tr>
              </table>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>

</body>
</html>
