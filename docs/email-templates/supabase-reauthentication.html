<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your verification code — Geneva Polo Social Members Club</title>
</head>
<body style="margin:0;padding:0;background-color:#F2F4F6;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#F2F4F6;min-height:100vh;">
    <tr>
      <td align="center" style="padding:48px 16px;">
        <table width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width:560px;width:100%;">

          <!-- Card -->
          <tr>
            <td style="background-color:#FFFFFF;border-radius:8px;padding:48px 48px 40px 48px;">
              <table width="100%" cellpadding="0" cellspacing="0" border="0">

                <!-- Brand header -->
                <tr>
                  <td style="padding-bottom:32px;">
                    <p style="margin:0;font-family:Georgia,serif;font-size:11px;letter-spacing:4px;text-transform:uppercase;color:#052938;font-weight:normal;">GENEVA POLO SOCIAL MEMBERS CLUB</p>
                  </td>
                </tr>

                <!-- Accent line -->
                <tr>
                  <td style="padding-bottom:0;">
                    <div style="width:48px;height:2px;background-color:#95CEE1;"></div>
                  </td>
                </tr>

                <!-- H1 -->
                <tr>
                  <td>
                    <h1 style="font-family:Georgia,serif;font-size:26px;font-weight:bold;color:#052938;margin:20px 0 8px 0;padding:0;">Verification Code</h1>
                  </td>
                </tr>

                <!-- Body text -->
                <tr>
                  <td style="padding-bottom:8px;">
                    <p style="font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:16px;line-height:1.65;color:#333F48;margin:0;">Use the code below to complete your verification. This code expires in 10 minutes.</p>
                  </td>
                </tr>

                <!-- OTP code box -->
                <tr>
                  <td style="padding:24px 0;">
                    <div style="background-color:#F2F4F6;border-radius:4px;padding:24px;text-align:center;">
                      <span style="font-family:Georgia,serif;font-size:36px;letter-spacing:12px;color:#052938;font-weight:bold;">{{ .Token }}</span>
                    </div>
                  </td>
                </tr>

                <!-- Divider -->
                <tr>
                  <td style="padding-bottom:24px;">
                    <div style="height:1px;background-color:#E8ECF0;"></div>
                  </td>
                </tr>

                <!-- Footer note -->
                <tr>
                  <td style="padding-bottom:32px;">
                    <p style="font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:13px;line-height:1.65;color:#8B99A8;margin:0;">If you did not request this code, you can safely ignore this email.</p>
                  </td>
                </tr>

                <!-- Divider -->
                <tr>
                  <td style="padding-bottom:20px;">
                    <div style="height:1px;background-color:#E8ECF0;"></div>
                  </td>
                </tr>

                <!-- Footer -->
                <tr>
                  <td>
                    <p style="font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:12px;line-height:1.65;color:#8B99A8;margin:0;">&copy; Geneva Polo Club &middot; Geneva, Switzerland</p>
                  </td>
                </tr>

              </table>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
